name: Benchmarks

on:
  pull_request_target:
    branches:
      - main

permissions:
  pull-requests: write
  contents: read

# Cancel a superseded benchmark run when new commits land on the same PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: MilesCranmer/AirspeedVelocity.jl@action-v1
        with:
          julia-version: '1'
